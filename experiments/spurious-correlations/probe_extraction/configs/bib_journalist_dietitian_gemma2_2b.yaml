# Bias-in-Bios: journalist (label=0) vs dietitian (label=1)
# Spurious feature: gender (0=male, 1=female)
# Model: google/gemma-2-2b, layer 22
#
# journalist is male-coded in BiB; dietitian is female-coded.
# The biased (ambiguous) split is: (male, journalist) + (female, dietitian),
# matching the real-world gender stereotype for these professions.

task_name:   bib_journalist_dietitian
model_name:  google/gemma-2-2b
layers_path: model.layers             # nnsight: LanguageModel.model → Gemma2Model
layer:       22
dtype:       bfloat16
device:      cuda:0
batch_size:  32
seed:        42
lr:          0.01
epochs:      1
output_dir:  .

model_kwargs:
  attn_implementation: eager            # required for Gemma-2 with nnsight

adapter:
  type:                 bias_in_bios
  neg_profession:       journalist      # true_label = 0
  pos_profession:       dietitian       # true_label = 1
  activation_dim_value: 2304
  hf_dataset_name:      LabHC/bias_in_bios
